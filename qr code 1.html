<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Paradise Hotel QR Code</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    text-align:center;
    padding:60px;
}

.qr-box{
    background:white;
    display:inline-block;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px gray;
}

.qr-box h2{
    color:#8B0000;
    margin-bottom:20px;
}

.qr-box img{
    width:250px;
    height:250px;
}

.qr-box p{
    margin-top:20px;
    font-size:18px;
}

.btn{
    background:#8B0000;
    color:white;
    padding:15px 30px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:20px;
}

.btn:hover{
    background:#A52A2A;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
    position:fixed;
    bottom:0;
    width:100%;
}

</style>
</head>

<body>

<header>
    <h1>DESIRE HOTEL</h1>
    <h3>Scan QR Code To Access Our Menu</h3>
</header>

<div class="container">

    <div class="qr-box">

        <h2>Hotel QR Code</h2>

       <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=menu.html"
            alt="QR Code">

        <p>
            Scan this QR code to open
            Desire Hotel Online Ordering System.
        </p>

        <br>

        <a href="home.html">
            <button class="btn">
                Back To Home
            </button>
        </a>

    </div>

</div>

<footer>
    © 2026 Paradise Hotel
</footer>

</body>
</html>
